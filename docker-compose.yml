services:
  postgres:
    image: postgres:16-alpine
    container_name: taskmanager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: taskmanagerdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskmanagerdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskmanager-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:mysecretpassword@postgres:5432/taskmanagerdb
      JWT_SECRET: supersecretjwtkey123changethisinproduction
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        cd src/config &&
        bunx prisma migrate deploy &&
        bunx prisma generate &&
        cd /app &&
        bun run src/config/seed.ts &&
        bun run src/server.ts
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskmanager-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - app

volumes:
  postgres_data: